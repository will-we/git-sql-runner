<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git SQL Runner</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="bg-gray-100">
  <aside class="fixed left-0 top-0 h-screen w-56 bg-white border-r border-gray-200">
    <div class="h-16 px-5 flex items-center border-b border-gray-200">
      <div class="text-xl font-bold">Git SQL Runner</div>
    </div>
    <nav class="p-4 space-y-2">
      <button class="nav-item w-full text-left px-3 py-2 rounded bg-blue-600 text-white" data-view="files">SQL 历史</button>
      <button class="nav-item w-full text-left px-3 py-2 rounded hover:bg-gray-100" data-view="records">执行记录</button>
      <button class="nav-item w-full text-left px-3 py-2 rounded hover:bg-gray-100" data-view="jobs">调度任务</button>
      <button class="nav-item w-full text-left px-3 py-2 rounded hover:bg-gray-100" data-view="dbconfig">数据库配置</button>
    </nav>
  </aside>

  <main class="ml-56 min-h-screen">
    <header class="h-16 px-6 flex items-center bg-white border-b border-gray-200">
      <h1 id="pageTitle" class="text-xl font-semibold">SQL 历史</h1>
    </header>
    <div class="p-6">
      <div id="statusBar" class="hidden mb-4 p-2 rounded text-sm"></div>

      <section id="view-files" class="view-pane">
        <div class="flex items-center space-x-2 mb-4">
          <button id="syncBtn" class="px-3 py-1 bg-blue-600 text-white rounded">同步本地 sql/ 目录</button>
          <button id="reloadTreeBtn" class="px-3 py-1 bg-gray-700 text-white rounded">刷新目录树</button>
          <button id="showAllBtn" class="px-3 py-1 bg-white border border-gray-300 text-gray-700 rounded">展示全部</button>
          <input id="baseDirInput" class="border rounded px-2 py-1 bg-white w-56" placeholder="baseDir，默认值加载中">
          <input id="sqlDirInput" class="border rounded px-2 py-1 bg-white w-40" placeholder="sqlDir，默认值加载中">
          <button id="applyDirBtn" class="px-3 py-1 bg-white border border-gray-300 text-gray-700 rounded">应用目录</button>
          <select id="filterExec" class="border rounded px-2 py-1 bg-white">
            <option value="">全部</option>
            <option value="0">未执行</option>
            <option value="1">已执行</option>
          </select>
        </div>
        <div class="flex gap-4">
          <aside class="w-72 bg-white shadow rounded p-3">
            <div class="font-semibold mb-2">SQL 目录</div>
            <div id="sqlTreeEmpty" class="text-xs text-gray-400">加载中...</div>
            <ul id="sqlTree" class="text-sm space-y-1"></ul>
          </aside>
          <div class="flex-1">
            <div class="overflow-auto bg-white shadow rounded">
            <table class="min-w-full">
              <thead>
              <tr class="bg-gray-100 text-left">
                <th class="p-2">ID</th>
                <th class="p-2">文件名</th>
                <th class="p-2">checksum</th>
                <th class="p-2">commit</th>
                <th class="p-2">状态</th>
                <th class="p-2">操作</th>
              </tr>
              </thead>
              <tbody id="fileBody"></tbody>
            </table>
            </div>
          </div>
        </div>
      </section>

      <section id="view-records" class="view-pane hidden">
        <div class="mb-2">
          <select id="filterStatus" class="border rounded px-2 py-1 bg-white">
            <option value="">全部</option>
            <option value="RUNNING">RUNNING</option>
            <option value="SUCCESS">SUCCESS</option>
            <option value="FAILED">FAILED</option>
          </select>
        </div>
        <table class="min-w-full bg-white shadow rounded">
          <thead>
          <tr class="bg-gray-100 text-left">
            <th class="p-2">ID</th>
            <th class="p-2">SQL 文件</th>
            <th class="p-2">状态</th>
            <th class="p-2">开始时间</th>
            <th class="p-2">耗时</th>
            <th class="p-2">失败原因</th>
            <th class="p-2">目标库</th>
            <th class="p-2">来源</th>
          </tr>
          </thead>
          <tbody id="recordBody"></tbody>
        </table>
      </section>

      <section id="view-jobs" class="view-pane hidden">
        <div class="bg-white rounded shadow p-5">
          <div class="text-lg font-semibold mb-2">调度任务</div>
          <div class="text-sm text-gray-600 mb-4">当前已启用定时索引任务：每 5 分钟扫描本地 sql/ 目录。</div>
          <button id="syncBtn2" class="px-3 py-1 bg-blue-600 text-white rounded">立即执行一次同步</button>
        </div>
      </section>

      <section id="view-dbconfig" class="view-pane hidden">
        <div class="mb-3 flex items-center space-x-2">
          <button id="addTargetBtn" class="px-3 py-1 bg-blue-600 text-white rounded">新增数据源</button>
          <button id="reloadTargetBtn" class="px-3 py-1 bg-gray-700 text-white rounded">刷新列表</button>
        </div>
        <div class="bg-white shadow rounded overflow-auto">
          <table class="min-w-full">
            <thead>
            <tr class="bg-gray-100 text-left">
              <th class="p-2">ID</th>
              <th class="p-2">标识</th>
              <th class="p-2">名称</th>
              <th class="p-2">类型</th>
              <th class="p-2">地址</th>
              <th class="p-2">状态</th>
              <th class="p-2">操作</th>
            </tr>
            </thead>
            <tbody id="targetDbBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded shadow max-w-3xl w-full">
      <div class="px-4 py-3 border-b flex items-center justify-between">
        <div>
          <div id="modalTitle" class="text-lg font-semibold"></div>
          <div id="modalPath" class="text-xs text-gray-500"></div>
        </div>
        <button id="modalClose" class="px-2 py-1 text-gray-500 hover:text-gray-700">关闭</button>
      </div>
      <div class="p-4">
        <pre class="max-h-96 overflow-auto"><code id="modalCode" class="language-sql"></code></pre>
        <div id="syntaxHint" class="mt-3 text-sm"></div>
        <div id="syntaxTooltip" class="hidden fixed z-50 max-w-xl bg-white border border-red-200 shadow px-3 py-2 text-sm text-red-700 rounded"></div>
        <div class="mt-3 flex items-center space-x-2">
          <label for="txMode" class="text-sm text-gray-600">事务模式</label>
          <select id="txMode" class="border rounded px-2 py-1">
            <option value="FILE">整文件事务</option>
            <option value="STATEMENT">逐语句提交</option>
          </select>
          <span class="ml-3 text-sm text-gray-600">目标库</span>
          <div id="targetDbList" class="flex flex-wrap gap-2 text-sm"></div>
          <label class="ml-3 text-sm text-gray-600 inline-flex items-center">
            <input id="lineNoToggle" type="checkbox" class="mr-1" checked>
            显示行号
          </label>
        </div>
      </div>
      <div class="px-4 py-3 border-t flex justify-end space-x-2">
        <button id="modalExec" class="px-3 py-1 bg-green-600 text-white rounded">确认执行</button>
        <button id="modalCancel" class="px-3 py-1 bg-gray-200 text-gray-700 rounded">取消</button>
      </div>
    </div>
  </div>

  <div id="targetDbModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded shadow w-full max-w-4xl">
      <div class="px-4 py-3 border-b flex items-center justify-between">
        <div id="targetDbModalTitle" class="text-lg font-semibold">新增数据源</div>
        <button id="targetDbModalClose" class="px-2 py-1 text-gray-500 hover:text-gray-700">关闭</button>
      </div>
      <div class="p-4 grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-gray-600">标识 targetId</label>
          <input id="tdTargetId" class="mt-1 w-full border rounded px-2 py-1">
        </div>
        <div>
          <label class="text-sm text-gray-600">名称</label>
          <input id="tdName" class="mt-1 w-full border rounded px-2 py-1">
        </div>
        <div>
          <label class="text-sm text-gray-600">类型</label>
          <select id="tdType" class="mt-1 w-full border rounded px-2 py-1">
            <option value="postgresql">postgresql</option>
            <option value="mysql">mysql</option>
          </select>
        </div>
        <div>
          <label class="text-sm text-gray-600">主机</label>
          <input id="tdHost" class="mt-1 w-full border rounded px-2 py-1" placeholder="127.0.0.1">
        </div>
        <div>
          <label class="text-sm text-gray-600">端口</label>
          <input id="tdPort" type="number" class="mt-1 w-full border rounded px-2 py-1">
        </div>
        <div>
          <label class="text-sm text-gray-600">数据库名称</label>
          <input id="tdDatabaseName" class="mt-1 w-full border rounded px-2 py-1">
        </div>
        <div>
          <label class="text-sm text-gray-600">用户名</label>
          <input id="tdUsername" class="mt-1 w-full border rounded px-2 py-1">
        </div>
        <div>
          <label class="text-sm text-gray-600">密码（编辑时留空表示不变）</label>
          <input id="tdPassword" type="password" class="mt-1 w-full border rounded px-2 py-1">
        </div>
        <div class="col-span-2">
          <label class="text-sm text-gray-600">JDBC 参数（可选）</label>
          <input id="tdJdbcParams" class="mt-1 w-full border rounded px-2 py-1" placeholder="useSSL=false&serverTimezone=UTC">
        </div>
        <div class="col-span-2">
          <label class="inline-flex items-center text-sm text-gray-600">
            <input id="tdEnabled" type="checkbox" class="mr-2" checked>启用
          </label>
        </div>
      </div>
      <div class="px-4 py-3 border-t flex items-center justify-between">
        <div id="targetDbModalHint" class="text-sm text-gray-500"></div>
        <div class="space-x-2">
          <button id="targetDbTestBtn" class="px-3 py-1 bg-yellow-500 text-white rounded">测试连接</button>
          <button id="targetDbSaveBtn" class="px-3 py-1 bg-blue-600 text-white rounded">保存</button>
          <button id="targetDbCancelBtn" class="px-3 py-1 bg-gray-200 text-gray-700 rounded">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setStatus(text, type) {
      const bar = $('#statusBar');
      if (!text) { bar.addClass('hidden'); return; }
      bar.removeClass('hidden')
        .removeClass('bg-green-100 text-green-800 bg-red-100 text-red-800 bg-yellow-100 text-yellow-800')
        .addClass(type === 'ok' ? 'bg-green-100 text-green-800'
          : type === 'warn' ? 'bg-yellow-100 text-yellow-800'
          : 'bg-red-100 text-red-800')
        .text(text);
    }
    function handleAjaxFail(jq, ctx) {
      const msg = (jq.responseJSON && jq.responseJSON.message) ? jq.responseJSON.message : (jq.status + ' ' + jq.statusText);
      setStatus((ctx || '请求失败') + '：' + msg, 'err');
    }
    function statusView(rawStatus, executed) {
      if (rawStatus === 'RUNNING') return { text: '执行中', cls: 'text-yellow-600' };
      if (rawStatus === 'FAILED') return { text: '失败', cls: 'text-red-600' };
      if (rawStatus === 'SUCCESS' || executed === true) return { text: '已执行', cls: 'text-green-600' };
      return { text: '未执行', cls: 'text-gray-500' };
    }
    function shortText(v, len) {
      if (!v) return '-';
      if (v.length <= len) return v;
      return v.substring(0, len) + '...';
    }
    function escapeHtml(v) {
      if (v == null) return '';
      return String(v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function formatTime(v) {
      if (!v) return '-';
      var d = new Date(v);
      if (isNaN(d.getTime())) return v;
      return d.getFullYear() + '年'
        + String(d.getMonth() + 1).padStart(2, '0') + '月'
        + String(d.getDate()).padStart(2, '0') + '日 '
        + String(d.getHours()).padStart(2, '0') + ':'
        + String(d.getMinutes()).padStart(2, '0') + ':'
        + String(d.getSeconds()).padStart(2, '0');
    }
    function durationText(startTime, endTime) {
      if (!startTime || !endTime) return '-';
      var s = new Date(startTime).getTime();
      var e = new Date(endTime).getTime();
      if (isNaN(s) || isNaN(e) || e < s) return '-';
      var ms = e - s;
      if (ms < 1000) return ms + 'ms';
      var sec = Math.floor(ms / 1000);
      if (sec < 60) return sec + 's';
      var min = Math.floor(sec / 60);
      var remain = sec % 60;
      return min + 'm ' + remain + 's';
    }
    function sourceBadge(v) {
      if (v === 'MANUAL') return '<span class="px-2 py-1 rounded text-xs bg-blue-100 text-blue-700">MANUAL</span>';
      if (v === 'SCHEDULE') return '<span class="px-2 py-1 rounded text-xs bg-purple-100 text-purple-700">SCHEDULE</span>';
      return '<span class="px-2 py-1 rounded text-xs bg-gray-100 text-gray-600">' + (v || '-') + '</span>';
    }
    function targetBadge(id, type) {
      if (!id && !type) return '<span class="text-gray-400">-</span>';
      var t = type ? String(type).toUpperCase() : '-';
      return '<span class="px-2 py-1 rounded text-xs bg-indigo-100 text-indigo-700">' + escapeHtml(id || '-') + ' · ' + escapeHtml(t) + '</span>';
    }
    function errorCell(msg, rowId) {
      if (!msg) return '<span class="text-gray-400">-</span>';
      var txt = String(msg);
      var shortMsg = shortText(txt, 80);
      var escapedShort = escapeHtml(shortMsg);
      var escapedFull = escapeHtml(txt);
      return '<div class="max-w-xl">'
        + '<div class="text-red-600 break-words">' + escapedShort + '</div>'
        + '<button class="errToggle text-xs text-blue-600 hover:underline mt-1" data-id="' + rowId + '">查看详情</button>'
        + '<div id="err-full-' + rowId + '" class="hidden mt-2 p-2 bg-red-50 border border-red-100 rounded text-red-700 text-xs whitespace-pre-wrap break-words">' + escapedFull + '</div>'
      + '</div>';
    }
    function renderSyntaxHint(check) {
      if (!check) {
        $('#syntaxHint').html('<div class="p-2 rounded bg-yellow-50 text-yellow-700">未获取到语法检查结果</div>');
        return;
      }
      if (check.ok) {
        $('#syntaxHint').html('<div class="p-2 rounded bg-green-50 text-green-700">语法检查通过（共 ' + (check.statementCount || 0) + ' 条语句）</div>');
        return;
      }
      var issues = check.issues || [];
      var items = [];
      for (var i = 0; i < issues.length && i < 3; i++) {
        var it = issues[i];
        items.push('<li class="mb-1">第 ' + escapeHtml(it.index) + ' 条：' + escapeHtml(it.message || '') + '<div class="text-xs text-red-500 mt-1 font-mono">' + escapeHtml(it.sql || '') + '</div></li>');
      }
      var more = issues.length > 3 ? '<div class="text-xs mt-1">其余 ' + (issues.length - 3) + ' 条请修复后重试</div>' : '';
      $('#syntaxHint').html(
        '<div class="p-2 rounded bg-red-50 text-red-700">'
        + '<div class="font-semibold mb-1">发现语法问题（' + issues.length + '）</div>'
        + '<ul class="list-disc pl-5">' + items.join('') + '</ul>'
        + more
        + '</div>'
      );
    }
    function splitSqlWithRange(sql) {
      var res = [];
      var inSingle = false, inDouble = false;
      var start = 0;
      for (var i = 0; i < sql.length; i++) {
        var c = sql.charAt(i);
        if (c === '\'' && !inDouble) inSingle = !inSingle;
        if (c === '"' && !inSingle) inDouble = !inDouble;
        if (c === ';' && !inSingle && !inDouble) {
          res.push({ text: sql.substring(start, i), start: start, end: i });
          start = i + 1;
        }
      }
      if (start < sql.length) {
        res.push({ text: sql.substring(start), start: start, end: sql.length });
      }
      return res;
    }
    function buildErrorRanges(content, check) {
      if (!check || !check.issues || !check.issues.length) return [];
      var parts = splitSqlWithRange(content || '');
      var ranges = [];
      for (var i = 0; i < check.issues.length; i++) {
        var issue = check.issues[i];
        var idx = Number(issue.index || 0) - 1;
        if (idx < 0 || idx >= parts.length) continue;
        var part = parts[idx];
        var token = issue.token;
        var localStart = 0;
        var localEnd = Math.min(part.text.length, 20);
        if (token) {
          var pos = part.text.indexOf(token);
          if (pos >= 0) {
            localStart = pos;
            localEnd = pos + token.length;
          }
        }
        if (localEnd <= localStart) continue;
        ranges.push({
          start: part.start + localStart,
          end: part.start + localEnd,
          message: issue.message || 'SQL 语法错误'
        });
      }
      ranges.sort(function(a, b){ return a.start - b.start; });
      var merged = [];
      var lastEnd = -1;
      for (var j = 0; j < ranges.length; j++) {
        var r = ranges[j];
        if (r.start < lastEnd) continue;
        merged.push(r);
        lastEnd = r.end;
      }
      return merged;
    }
    function withLineNumbers(codeHtml) {
      var lines = codeHtml.split('\n');
      var rows = [];
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.length === 0) line = '&nbsp;';
        rows.push('<div class="flex"><span class="w-10 pr-3 text-right text-gray-400 select-none border-r border-gray-200 mr-3">' + (i + 1) + '</span><span class="flex-1 whitespace-pre">' + line + '</span></div>');
      }
      return rows.join('');
    }
    function renderSqlPreview(content, check) {
      var text = content || '';
      var ranges = buildErrorRanges(text, check);
      var out = [];
      var pos = 0;
      if (!ranges.length) {
        out.push(escapeHtml(text));
      } else {
        for (var i = 0; i < ranges.length; i++) {
          var r = ranges[i];
          if (r.start > pos) out.push(escapeHtml(text.substring(pos, r.start)));
          out.push('<span class="sql-err-token cursor-help" data-msg="' + escapeHtml(r.message) + '" style="text-decoration-line: underline; text-decoration-style: wavy; text-decoration-color: #dc2626; text-underline-offset: 2px;">' + escapeHtml(text.substring(r.start, r.end)) + '</span>');
          pos = r.end;
        }
        if (pos < text.length) out.push(escapeHtml(text.substring(pos)));
      }
      var html = out.join('');
      if ($('#lineNoToggle').prop('checked')) {
        html = withLineNumbers(html);
      }
      document.getElementById('modalCode').innerHTML = html;
    }
    var sqlFileMap = {};
    var focusSqlId = null;
    var selectedTreeFileId = null;
    var selectedTreePath = null;
    var treeExpandedMap = {};
    var defaultBaseDir = '.';
    var defaultSqlDir = 'sql';
    var availableTargets = [];
    var targetDbConfigs = [];
    var editingTargetDbId = null;
    var currentBaseDir = defaultBaseDir;
    var currentSqlDir = defaultSqlDir;
    function applySyncDirDefaults(baseDir, sqlDir) {
      defaultBaseDir = (baseDir || '.').trim() || '.';
      defaultSqlDir = (sqlDir || 'sql').trim() || 'sql';
      currentBaseDir = defaultBaseDir;
      currentSqlDir = defaultSqlDir;
      $('#baseDirInput').val(currentBaseDir).attr('placeholder', 'baseDir，默认 ' + defaultBaseDir);
      $('#sqlDirInput').val(currentSqlDir).attr('placeholder', 'sqlDir，默认 ' + defaultSqlDir);
    }
    function loadSyncDirDefaults() {
      return $.get('/api/settings/sync-dir', function(cfg) {
        applySyncDirDefaults(cfg && cfg.baseDir, cfg && cfg.sqlDir);
      }).fail(function() {
        applySyncDirDefaults(defaultBaseDir, defaultSqlDir);
      });
    }
    function activeDirParams() {
      return '?baseDir=' + encodeURIComponent(currentBaseDir) + '&sqlDir=' + encodeURIComponent(currentSqlDir);
    }
    function isTreeExpanded(path) {
      if (treeExpandedMap[path] === undefined) {
        treeExpandedMap[path] = true;
      }
      return treeExpandedMap[path];
    }
    function treeNodeHtml(node, level) {
      var pad = level * 12;
      if (node.type === 'dir') {
        var children = node.children || [];
        var expanded = isTreeExpanded(node.path);
        var icon = expanded ? '▼' : '▶';
        var childHtml = children.map(function(c){ return treeNodeHtml(c, level + 1); }).join('');
        return '<li>'
          + '<button class="tree-dir-toggle w-full text-left text-gray-700 font-medium hover:bg-gray-100 rounded px-1 py-0.5" style="padding-left:' + pad + 'px" data-path="' + escapeHtml(node.path) + '">' + icon + ' 📁 ' + escapeHtml(node.name) + '</button>'
          + (childHtml ? ('<ul class="space-y-1 mt-1 ' + (expanded ? '' : 'hidden') + '">' + childHtml + '</ul>') : '')
          + '</li>';
      }
      var cls = selectedTreePath === node.path ? 'bg-blue-50 text-blue-700 border-blue-200' : 'hover:bg-gray-100 border-transparent';
      var statusDot = node.status === 'SUCCESS' ? '<span class="text-green-600">●</span>' : (node.status === 'FAILED' ? '<span class="text-red-600">●</span>' : '<span class="text-gray-400">●</span>');
      return '<li>'
        + '<button class="tree-file w-full text-left px-2 py-1 rounded border ' + cls + '" style="padding-left:' + pad + 'px" data-id="' + (node.id || '') + '" data-path="' + escapeHtml(node.path) + '">'
        + statusDot + ' <span class="font-mono">' + escapeHtml(node.name) + '</span>'
        + '</button>'
      + '</li>';
    }
    function loadSqlTree() {
      $.get('/api/files/tree' + activeDirParams(), function(root){
        var children = (root && root.children) ? root.children : [];
        if (!children.length) {
          $('#sqlTree').html('');
          $('#sqlTreeEmpty').removeClass('hidden').text('目录为空或未找到：' + currentBaseDir + '/' + currentSqlDir);
          return;
        }
        $('#sqlTreeEmpty').addClass('hidden');
        var html = children.map(function(n){ return treeNodeHtml(n, 0); }).join('');
        $('#sqlTree').html(html);
      }).fail(function(jq){ handleAjaxFail(jq, '加载 SQL 目录树失败'); });
    }
    function loadFiles() {
      const v = $('#filterExec').val();
      const param = v==='' ? '' : ('?executed=' + (v==='1'?'true':'false'));
      $.get('/api/files' + param, function(data) {
        if (selectedTreeFileId != null) {
          data = data.filter(function(f){ return Number(f.id) === Number(selectedTreeFileId); });
        } else if (selectedTreePath) {
          data = data.filter(function(f){ return f.filePath === selectedTreePath; });
        }
        sqlFileMap = {};
        data.forEach(function(f){ sqlFileMap[f.id] = f; });
        const rows = data.map(function(f){
          var sv = statusView(f.lastStatus, f.executed);
          var focusCls = (focusSqlId != null && Number(f.id) === Number(focusSqlId)) ? ' bg-yellow-50' : '';
          return '<tr class="border-t' + focusCls + '" data-sql-id="' + f.id + '">'
            + '<td class="p-2">' + f.id + '</td>'
            + '<td class="p-2"><span class="font-mono">' + f.fileName + '</span><div class="text-gray-400 text-xs">' + (f.filePath||'') + '</div></td>'
            + '<td class="p-2 font-mono text-xs text-gray-600 break-all" title="' + escapeHtml(f.checksum || '-') + '">' + escapeHtml(f.checksum || '-') + '</td>'
            + '<td class="p-2 font-mono text-xs text-gray-600 break-all" title="' + escapeHtml(f.gitCommitId || '-') + '">' + escapeHtml(f.gitCommitId || '-') + '</td>'
            + '<td class="p-2 font-semibold ' + sv.cls + '">' + sv.text + '</td>'
            + '<td class="p-2">'
              + '<button class="px-2 py-1 bg-green-600 text-white rounded execBtn" data-id="' + f.id + '">执行</button>'
              + '<button class="px-2 py-1 bg-gray-700 text-white rounded ml-1 previewBtn" data-id="' + f.id + '">预览</button>'
            + '</td>'
          + '</tr>';
        });
        $('#fileBody').html(rows.join(''));
        if (focusSqlId != null) {
          var target = $('#fileBody').find('tr[data-sql-id="' + focusSqlId + '"]');
          if (target.length) {
            target[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            setStatus('已定位到 SQL 历史（sqlId=' + focusSqlId + '）', 'ok');
            focusSqlId = null;
          } else {
            setStatus('未找到对应 SQL 历史记录（sqlId=' + focusSqlId + '）', 'warn');
            focusSqlId = null;
          }
        } else {
          setStatus('', 'ok');
        }
      }).fail(function(jq){ handleAjaxFail(jq,'加载文件列表失败'); });
    }
    function loadRecords() {
      const v = $('#filterStatus').val();
      const param = v==='' ? '' : ('?status='+v);
      $.get('/api/records/view'+param, function(data) {
        const rows = data.map(function(r){
          var sv = statusView(r.status, null);
          return '<tr class="border-t">'
            + '<td class="p-2">' + r.id + '</td>'
            + '<td class="p-2"><div class="font-medium">' + (r.sqlFileName || '-') + '</div><div class="mt-1"><button class="locateSqlBtn text-xs px-2 py-0.5 rounded bg-blue-50 text-blue-700 hover:bg-blue-100" data-sql-id="' + r.sqlFileId + '">sqlId:' + r.sqlFileId + '</button></div></td>'
            + '<td class="p-2 font-semibold ' + sv.cls + '">' + sv.text + '</td>'
            + '<td class="p-2">' + formatTime(r.startTime) + '</td>'
            + '<td class="p-2">' + (r.durationMs == null ? durationText(r.startTime, r.endTime) : (r.durationMs + 'ms')) + '</td>'
            + '<td class="p-2 align-top">' + errorCell(r.errorMessage, r.id) + '</td>'
            + '<td class="p-2">' + targetBadge(r.targetDbId, r.targetDbType) + '</td>'
            + '<td class="p-2">' + sourceBadge(r.executedBy) + '</td>'
          + '</tr>';
        });
        $('#recordBody').html(rows.join(''));
      }).fail(function(jq){ handleAjaxFail(jq,'加载执行记录失败'); });
    }
    function selectedTargetIds() {
      return $('#targetDbList').find('input[type=checkbox]:checked').map(function(){ return $(this).val(); }).get();
    }
    function saveTargetSelection(ids) {
      localStorage.setItem('sqlRunner.selectedTargets', JSON.stringify(ids || []));
    }
    function loadSavedTargetSelection() {
      try {
        var v = localStorage.getItem('sqlRunner.selectedTargets');
        if (!v) return [];
        var arr = JSON.parse(v);
        return Array.isArray(arr) ? arr.map(function(x){ return String(x); }) : [];
      } catch (e) {
        return [];
      }
    }
    function renderTargetOptions() {
      if (!availableTargets.length) {
        $('#targetDbList').html('<span class="text-xs text-gray-400">未配置目标库</span>');
        return;
      }
      var saved = loadSavedTargetSelection();
      var html = availableTargets.map(function(t){
        var checked = saved.indexOf(t.id) >= 0 ? ' checked' : '';
        var dbName = t.databaseName ? (' / ' + String(t.databaseName)) : '';
        var text = escapeHtml(t.label || t.id) + ' (' + escapeHtml((t.type || '').toUpperCase()) + escapeHtml(dbName) + ')';
        return '<label class="inline-flex items-center text-xs border rounded px-2 py-1 bg-gray-50">'
          + '<input type="checkbox" class="mr-1 targetDbCk" value="' + escapeHtml(t.id) + '"' + checked + '>'
          + text
          + '</label>';
      }).join('');
      $('#targetDbList').html(html);
    }
    function loadTargets() {
      return $.get('/api/settings/targets', function(resp){
        availableTargets = (resp && resp.targets) ? resp.targets : [];
        renderTargetOptions();
      }).fail(function(){
        availableTargets = [];
        renderTargetOptions();
      });
    }
    function collectTargetDbForm() {
      return {
        targetId: ($('#tdTargetId').val() || '').trim(),
        name: ($('#tdName').val() || '').trim(),
        dbType: ($('#tdType').val() || '').trim(),
        host: ($('#tdHost').val() || '').trim(),
        port: Number($('#tdPort').val() || 0),
        databaseName: ($('#tdDatabaseName').val() || '').trim(),
        username: ($('#tdUsername').val() || '').trim(),
        password: $('#tdPassword').val() || '',
        jdbcParams: ($('#tdJdbcParams').val() || '').trim(),
        enabled: $('#tdEnabled').prop('checked')
      };
    }
    function fillTargetDbForm(item) {
      $('#tdTargetId').val(item ? (item.targetId || '') : '');
      $('#tdName').val(item ? (item.name || '') : '');
      $('#tdType').val(item ? (item.dbType || 'postgresql') : 'postgresql');
      $('#tdHost').val(item ? (item.host || '') : '127.0.0.1');
      $('#tdPort').val(item ? (item.port || '') : '');
      $('#tdDatabaseName').val(item ? (item.databaseName || '') : '');
      $('#tdUsername').val(item ? (item.username || '') : '');
      $('#tdPassword').val('');
      $('#tdJdbcParams').val(item ? (item.jdbcParams || '') : '');
      $('#tdEnabled').prop('checked', item ? !!item.enabled : true);
      $('#targetDbModalHint').text('');
    }
    function openTargetDbModal(item) {
      editingTargetDbId = item ? item.id : null;
      $('#targetDbModalTitle').text(item ? '编辑数据源' : '新增数据源');
      fillTargetDbForm(item || null);
      $('#targetDbModal').removeClass('hidden').addClass('flex');
    }
    function closeTargetDbModal() {
      $('#targetDbModal').addClass('hidden').removeClass('flex');
      editingTargetDbId = null;
    }
    function targetDbStatusBadge(enabled) {
      return enabled
        ? '<span class="px-2 py-1 rounded text-xs bg-green-100 text-green-700">启用</span>'
        : '<span class="px-2 py-1 rounded text-xs bg-gray-100 text-gray-600">停用</span>';
    }
    function loadTargetDbConfigs() {
      return $.get('/api/targets', function(resp) {
        targetDbConfigs = (resp && resp.items) ? resp.items : [];
        var rows = targetDbConfigs.map(function(t) {
          var addr = (t.host || '-') + ':' + (t.port || '-') + '/' + (t.databaseName || '-');
          return '<tr class="border-t">'
            + '<td class="p-2">' + t.id + '</td>'
            + '<td class="p-2 font-mono text-xs">' + escapeHtml(t.targetId || '-') + '</td>'
            + '<td class="p-2">' + escapeHtml(t.name || '-') + '</td>'
            + '<td class="p-2">' + escapeHtml((t.dbType || '').toUpperCase()) + '</td>'
            + '<td class="p-2 font-mono text-xs">' + escapeHtml(addr) + '</td>'
            + '<td class="p-2">' + targetDbStatusBadge(!!t.enabled) + '</td>'
            + '<td class="p-2 space-x-1">'
              + '<button class="px-2 py-1 bg-blue-600 text-white rounded targetEditBtn" data-id="' + t.id + '">编辑</button>'
              + '<button class="px-2 py-1 bg-yellow-500 text-white rounded targetTestBtn" data-id="' + t.id + '">检测</button>'
              + '<button class="px-2 py-1 bg-red-600 text-white rounded targetDeleteBtn" data-id="' + t.id + '">删除</button>'
            + '</td>'
          + '</tr>';
        });
        $('#targetDbBody').html(rows.join(''));
      }).fail(function(jq){ handleAjaxFail(jq, '加载数据库配置失败'); });
    }
    function switchView(view) {
      $('.view-pane').addClass('hidden');
      $('#view-' + view).removeClass('hidden');
      $('.nav-item')
        .removeClass('bg-blue-600 text-white')
        .addClass('hover:bg-gray-100');
      $('.nav-item[data-view="' + view + '"]')
        .addClass('bg-blue-600 text-white')
        .removeClass('hover:bg-gray-100');
      if (view === 'files') { $('#pageTitle').text('SQL 历史'); }
      if (view === 'records') { $('#pageTitle').text('执行记录'); }
      if (view === 'jobs') { $('#pageTitle').text('调度任务'); }
      if (view === 'dbconfig') { $('#pageTitle').text('数据库配置'); }
    }
    $(function() {
      if (!window.jQuery) {
        setStatus('jQuery 加载失败，请检查网络或使用本地镜像', 'warn');
      }
      loadRecords();
      switchView('files');
      loadSyncDirDefaults().always(function() {
        loadFiles();
        loadSqlTree();
      });
      loadTargets();
      $('.nav-item').on('click', function() {
        var view = $(this).data('view');
        switchView(view);
        if (view === 'records') { loadRecords(); }
        if (view === 'files') { loadFiles(); }
        if (view === 'dbconfig') { loadTargetDbConfigs(); }
      });
      $('#filterExec').change(loadFiles);
      $('#filterStatus').change(loadRecords);
      $('#reloadTreeBtn').on('click', function() { loadSqlTree(); });
      $('#applyDirBtn').on('click', function() {
        currentBaseDir = ($('#baseDirInput').val() || defaultBaseDir).trim() || defaultBaseDir;
        currentSqlDir = ($('#sqlDirInput').val() || defaultSqlDir).trim() || defaultSqlDir;
        selectedTreeFileId = null;
        selectedTreePath = null;
        treeExpandedMap = {};
        loadSqlTree();
        loadFiles();
        setStatus('已切换目录：' + currentBaseDir + '/' + currentSqlDir, 'ok');
      });
      $('#showAllBtn').on('click', function() {
        selectedTreeFileId = null;
        selectedTreePath = null;
        loadSqlTree();
        loadFiles();
      });
      $('#sqlTree').on('click', '.tree-dir-toggle', function() {
        var path = $(this).data('path');
        treeExpandedMap[path] = !isTreeExpanded(path);
        loadSqlTree();
      });
      $('#sqlTree').on('click', '.tree-file', function() {
        selectedTreeFileId = $(this).data('id') ? Number($(this).data('id')) : null;
        selectedTreePath = $(this).data('path') || null;
        if (selectedTreeFileId == null) {
          setStatus('该文件尚未入库，请先执行同步', 'warn');
        }
        loadSqlTree();
        loadFiles();
      });
      $('#recordBody').on('click', '.locateSqlBtn', function() {
        var sqlId = $(this).data('sql-id');
        focusSqlId = sqlId;
        $('#filterExec').val('');
        switchView('files');
        loadFiles();
      });
      $('#recordBody').on('click', '.errToggle', function() {
        var id = $(this).data('id');
        var panel = $('#err-full-' + id);
        var opened = !panel.hasClass('hidden');
        if (opened) {
          panel.addClass('hidden');
          $(this).text('查看详情');
        } else {
          panel.removeClass('hidden');
          $(this).text('收起');
        }
      });
      $('#modalCode').on('mouseenter', '.sql-err-token', function() {
        $('#syntaxTooltip').text($(this).data('msg') || 'SQL 语法错误').removeClass('hidden');
      });
      $('#modalCode').on('mousemove', '.sql-err-token', function(e) {
        $('#syntaxTooltip').css({ left: (e.clientX + 12) + 'px', top: (e.clientY + 12) + 'px' });
      });
      $('#modalCode').on('mouseleave', '.sql-err-token', function() {
        $('#syntaxTooltip').addClass('hidden').text('');
      });
      var currentPreviewId = null;
      var currentPreviewContent = '';
      var currentPreviewCheck = null;
      function openModalWithId(id) {
        currentPreviewId = id;
        $.get('/api/files/'+id+'/preview', function(data){
          if (data.error) { alert(data.error); return; }
          $('#modalTitle').text(data.fileName||'');
          $('#modalPath').text(data.filePath||'');
          currentPreviewContent = data.content || '';
          currentPreviewCheck = data.syntaxCheck || null;
          renderSqlPreview(currentPreviewContent, currentPreviewCheck);
          renderSyntaxHint(data.syntaxCheck);
          $('#previewModal').removeClass('hidden').addClass('flex');
        }).fail(function(jq){ handleAjaxFail(jq,'加载预览失败'); });
      }
      $('#lineNoToggle').on('change', function() {
        renderSqlPreview(currentPreviewContent, currentPreviewCheck);
      });
      $('#targetDbList').on('change', '.targetDbCk', function() {
        saveTargetSelection(selectedTargetIds());
      });
      $('#addTargetBtn').on('click', function() {
        openTargetDbModal(null);
      });
      $('#reloadTargetBtn').on('click', function() {
        loadTargetDbConfigs();
      });
      $('#targetDbBody').on('click', '.targetEditBtn', function() {
        var id = Number($(this).data('id'));
        var item = targetDbConfigs.find(function(x){ return Number(x.id) === id; });
        if (!item) return;
        openTargetDbModal(item);
      });
      $('#targetDbBody').on('click', '.targetDeleteBtn', function() {
        var id = Number($(this).data('id'));
        if (!confirm('确认删除该数据源吗？')) return;
        $.ajax({
          url: '/api/targets/' + id,
          method: 'DELETE'
        }).done(function() {
          setStatus('删除成功', 'ok');
          loadTargetDbConfigs();
          loadTargets();
        }).fail(function(jq){
          handleAjaxFail(jq, '删除数据源失败');
        });
      });
      $('#targetDbBody').on('click', '.targetTestBtn', function() {
        var id = Number($(this).data('id'));
        $.ajax({
          url: '/api/targets/' + id + '/test',
          method: 'POST'
        }).done(function(resp){
          if (resp && resp.ok) {
            setStatus('连接检测成功：' + (resp.dbProduct || ''), 'ok');
          } else {
            setStatus('连接检测失败：' + ((resp && resp.message) || '未知错误'), 'warn');
          }
        }).fail(function(jq){
          handleAjaxFail(jq, '连接检测失败');
        });
      });
      $('#targetDbModalClose, #targetDbCancelBtn').on('click', function() {
        closeTargetDbModal();
      });
      $('#targetDbTestBtn').on('click', function() {
        var payload = collectTargetDbForm();
        $.ajax({
          url: '/api/targets/test',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(payload)
        }).done(function(resp){
          if (resp && resp.ok) {
            $('#targetDbModalHint').text('连接成功：' + (resp.dbProduct || ''));
            setStatus('连接检测通过', 'ok');
          } else {
            $('#targetDbModalHint').text('连接失败：' + ((resp && resp.message) || '未知错误'));
            setStatus('连接检测失败', 'warn');
          }
        }).fail(function(jq){
          handleAjaxFail(jq, '连接检测失败');
        });
      });
      $('#targetDbSaveBtn').on('click', function() {
        var payload = collectTargetDbForm();
        var url = editingTargetDbId == null ? '/api/targets' : ('/api/targets/' + editingTargetDbId);
        var method = editingTargetDbId == null ? 'POST' : 'PUT';
        $.ajax({
          url: url,
          method: method,
          contentType: 'application/json',
          data: JSON.stringify(payload)
        }).done(function() {
          closeTargetDbModal();
          setStatus('数据源保存成功', 'ok');
          loadTargetDbConfigs();
          loadTargets();
        }).fail(function(jq){
          handleAjaxFail(jq, '保存数据源失败');
        });
      });
      $('#fileBody').on('click', '.execBtn', function() {
        var id = $(this).data('id');
        openModalWithId(id);
      });
      $('#modalClose, #modalCancel').on('click', function(){
        $('#syntaxTooltip').addClass('hidden').text('');
        $('#previewModal').addClass('hidden').removeClass('flex');
      });
      $('#modalExec').on('click', function(){
        var id = currentPreviewId;
        var mode = $('#txMode').val() || 'FILE';
        var targetIds = selectedTargetIds();
        if (!targetIds.length) {
          alert('请至少选择一个目标库');
          return;
        }
        saveTargetSelection(targetIds);
        $.ajax({
          url: '/api/files/' + id + '/execute',
          method: 'POST',
          traditional: true,
          data: { mode: mode, targetIds: targetIds }
        }).done(function(resp){
          $('#previewModal').addClass('hidden').removeClass('flex');
          var total = (resp && resp.totalCount) || targetIds.length;
          var success = (resp && resp.successCount) || 0;
          var failed = (resp && resp.failedCount) || (total - success);
          setStatus('执行完成：成功 ' + success + '，失败 ' + failed + '，总计 ' + total, failed > 0 ? 'warn' : 'ok');
          loadFiles(); loadRecords();
        }).fail(function(err){
          var msg = (err.responseJSON && err.responseJSON.message) ? err.responseJSON.message : '未知错误';
          alert('执行失败: ' + msg);
        });
      });
      $('#fileBody').on('click', '.previewBtn', function() {
        var id = $(this).data('id');
        var w = window.open('', '_blank');
        if (!w) { alert('浏览器阻止了弹窗'); return; }
        w.document.write('<!doctype html><html><head><meta charset="UTF-8"><title>预览</title>'
          + '<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">'
          + '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">'
          + '</head><body class="bg-gray-900 text-gray-100">'
          + '<div class="max-w-4xl mx-auto py-6">'
          + '<h1 id="pv-title" class="text-xl font-bold mb-2"></h1>'
          + '<div id="pv-path" class="text-xs text-gray-400 mb-4"></div>'
          + '<pre><code id="pv-code" class="language-sql"></code></pre>'
          + '</div></body></html>');
        w.document.close();
        $.get('/api/files/'+id+'/preview', function(data) {
          if (data.error) { w.document.body.innerText = data.error; return; }
          w.document.getElementById('pv-title').textContent = data.fileName || '';
          w.document.getElementById('pv-path').textContent = data.filePath || '';
          var code = w.document.getElementById('pv-code');
          code.textContent = data.content || '';
          var s = w.document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js';
          s.onload = function(){ if (w.hljs) { w.hljs.highlightAll(); } };
          w.document.head.appendChild(s);
        }).fail(function(jq){
          var m = (jq.responseJSON && jq.responseJSON.message) ? jq.responseJSON.message : (jq.status+' '+jq.statusText);
          w.document.body.innerText = '预览失败：' + m;
        });
      });
      $('#syncBtn').click(function(){
        $.post('/api/sync/local' + activeDirParams()).done(function(){ loadFiles(); loadSqlTree(); setStatus('同步完成：' + currentBaseDir + '/' + currentSqlDir, 'ok'); })
          .fail(function(jq){ handleAjaxFail(jq,'同步失败'); });
      });
      $('#syncBtn2').click(function(){
        $.post('/api/sync/local' + activeDirParams()).done(function(){ loadFiles(); loadSqlTree(); setStatus('同步完成：' + currentBaseDir + '/' + currentSqlDir, 'ok'); })
          .fail(function(jq){ handleAjaxFail(jq,'同步失败'); });
      });
    });
  </script>
</body>
</html>
