name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build Package
        run: mvn -B -ntp clean package -DskipTests
      - name: Generate Checksums
        run: |
          shopt -s nullglob
          for f in target/*.jar; do
            sha256sum "$f" > "$f.sha256"
          done
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/*.jar
      - name: Build Full Changelog
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi
          COMMITS="$(git log --pretty=format:'%s|%h' "${RANGE}" || true)"
          section() {
            local title="$1"
            local pattern="$2"
            local lines
            lines="$(echo "${COMMITS}" | grep -E "${pattern}" || true)"
            if [ -n "${lines}" ]; then
              echo "### ${title}"
              echo "${lines}" | while IFS='|' read -r subject hash; do
                if [ -n "${subject}" ] && [ -n "${hash}" ]; then
                  echo "- ${subject} (${hash})"
                fi
              done
              echo
            fi
          }
          {
            echo "## Changelog"
            echo
            section "Features" '^(feat)(\(.+\))?:'
            section "Fixes" '^(fix)(\(.+\))?:'
            section "Refactors" '^(refactor)(\(.+\))?:'
            section "Docs" '^(docs)(\(.+\))?:'
            section "Chores" '^(chore)(\(.+\))?:'
            section "Others" '^((build|ci|perf|test|style|revert)(\(.+\))?:|[^:]+$)'
            echo "## Git Commits"
            if [ -n "${COMMITS}" ]; then
              echo "${COMMITS}" | while IFS='|' read -r subject hash; do
                if [ -n "${subject}" ] && [ -n "${hash}" ]; then
                  echo "- ${subject} (${hash})"
                fi
              done
            else
              echo "- No commits found in range"
            fi
            echo
            echo
            echo "## Full Changelog"
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            else
              echo "https://github.com/${GITHUB_REPOSITORY}/commits/${CURRENT_TAG}"
            fi
          } > RELEASE_CHANGELOG.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            target/*.jar.sha256
          generate_release_notes: true
          append_body: true
          body_path: RELEASE_CHANGELOG.md
