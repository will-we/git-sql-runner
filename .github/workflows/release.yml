name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build Package
        run: mvn -B -ntp clean package -DskipTests
      - name: Generate Checksums
        run: |
          shopt -s nullglob
          for f in target/*.jar; do
            sha256sum "$f" > "$f.sha256"
          done
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/*.jar
      - name: Build Full Changelog
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          {
            echo "## Git Commits"
            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${CURRENT_TAG}" || true
            else
              git log --pretty=format:'- %s (%h)' "${CURRENT_TAG}" || true
            fi
            echo
            echo
            echo "## Full Changelog"
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            else
              echo "https://github.com/${GITHUB_REPOSITORY}/commits/${CURRENT_TAG}"
            fi
          } > RELEASE_CHANGELOG.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            target/*.jar.sha256
          generate_release_notes: true
          append_body: true
          body_path: RELEASE_CHANGELOG.md
