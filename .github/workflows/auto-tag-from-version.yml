name: Auto Tag From Maven Version

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - pom.xml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  create-version-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Detect tag target
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1 | tr -d '\r')"
          if [ -z "${VERSION}" ]; then
            echo "project.version is empty"
            exit 1
          fi
          if [[ "${VERSION}" == *-SNAPSHOT ]]; then
            echo "skip snapshot version: ${VERSION}"
            echo "should_tag=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS_POM="$(mktemp)"
            git show HEAD~1:pom.xml > "${PREVIOUS_POM}"
            PREVIOUS_VERSION="$(mvn -q -DforceStdout -f "${PREVIOUS_POM}" help:evaluate -Dexpression=project.version | tail -n 1 | tr -d '\r')"
            rm -f "${PREVIOUS_POM}"
            if [ "${PREVIOUS_VERSION}" = "${VERSION}" ]; then
              echo "project.version unchanged: ${VERSION}"
              echo "should_tag=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "tag already exists: ${TAG}"
            echo "should_tag=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "tag to create: ${TAG}"
          echo "should_tag=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        if: steps.detect.outputs.should_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.detect.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Trigger release workflow
        if: steps.detect.outputs.should_tag == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.detect.outputs.tag }}"
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches \
            -d "{\"ref\":\"${TAG}\"}"
